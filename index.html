<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1 (Money Room Edition)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header {
padding:15px;
background:#151925;
text-align:center;
font-size:16px;
font-weight:bold;
}

.container {
display:flex;
flex-wrap:wrap;
gap:15px;
padding:15px;
}

.card {
background:#1b2130;
padding:12px;
border-radius:10px;
flex:1;
min-width:280px;
}

h2 { font-size:14px; color:#00d4ff; margin-bottom:8px; }

input, select, button {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:none;
outline:none;
font-size:14px;
}

button {
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

button:hover { opacity:0.85; }

table {
width:100%;
border-collapse:collapse;
font-size:11px;
}

th, td {
border-bottom:1px solid #333;
padding:6px;
text-align:left;
white-space:nowrap;
}

.green { color:#00ff99; }
.yellow { color:#ffcc00; }
.red { color:#ff4d4d; }

.small { font-size:11px; opacity:0.7; }

@media (orientation: portrait) {
table { font-size:10px; }
}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v1 — Money Room Edition</header>

<div class="container">

<!-- INTKE -->
<div class="card">
<h2>📥 Deal Intake</h2>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">
<input id="rehab" placeholder="Rehab Cost">

<button onclick="addDeal()">Add Deal</button>

<p class="small">Only clean numbers enter the system.</p>
</div>

<!-- ANALYSIS -->
<div class="card">
<h2>🧠 Deal Analyzer</h2>

<button onclick="calcDeal()">Run Analysis</button>

<p id="output"></p>
<p id="decision"></p>
</div>

<!-- ACTION -->
<div class="card">
<h2>⚙️ Actions</h2>

<button onclick="sendEmail('richman@rootoflyfe.com')">Email Me</button>
<button onclick="sendEmail('richprivatelender@gmail.com')">Email Lender</button>
<button onclick="window.print()">Export Deal</button>

<p class="small">Decision layer → communication layer → capital layer</p>
</div>

<!-- PIPELINE -->
<div class="card" style="flex-basis:100%">
<h2>📊 Deal Pipeline</h2>

<table>
<thead>
<tr>
<th>Address</th>
<th>Buy</th>
<th>ARV</th>
<th>Rehab</th>
<th>Spread</th>
<th>Status</th>
</tr>
</thead>

<tbody id="pipeline"></tbody>
</table>

</div>

</div>

<script>

let deals = JSON.parse(localStorage.getItem("deals") || "[]");

function cleanNumber(val){
let n = parseFloat(val);
return isNaN(n) ? null : n;
}

function addDeal() {

let deal = {
address: document.getElementById("address").value.trim(),
purchase: cleanNumber(document.getElementById("purchase").value),
arv: cleanNumber(document.getElementById("arv").value),
rehab: cleanNumber(document.getElementById("rehab").value)
};

// 🚫 block garbage entries
if(!deal.address || !deal.purchase || !deal.arv || deal.rehab === null){
alert("Incomplete deal. Fix inputs before adding.");
return;
}

deals.push(deal);
save();
render();
}

function calcDeal() {

let purchase = cleanNumber(document.getElementById("purchase").value);
let arv = cleanNumber(document.getElementById("arv").value);
let rehab = cleanNumber(document.getElementById("rehab").value);

if(!purchase || !arv || rehab === null){
document.getElementById("output").innerHTML = "Fix inputs first.";
return;
}

let totalCost = purchase + rehab;
let spread = arv - totalCost;

document.getElementById("output").innerHTML =
`Total Cost: $${totalCost.toLocaleString()}<br>Spread: $${spread.toLocaleString()}`;

let status =
spread > 30000 ? "🟢 ASSIGNABLE" :
spread > 10000 ? "🟡 REVIEW" :
"🔴 KILL DEAL";

document.getElementById("decision").innerHTML = status;
}

function render() {

let html = "";

deals.forEach(d => {

if(!d.address || !d.purchase || !d.arv || d.rehab === null) return;

let spread = d.arv - (d.purchase + d.rehab);

let statusClass =
spread > 30000 ? "green" :
spread > 10000 ? "yellow" :
"red";

html += `
<tr>
<td>${d.address}</td>
<td>$${d.purchase.toLocaleString()}</td>
<td>$${d.arv.toLocaleString()}</td>
<td>$${d.rehab.toLocaleString()}</td>
<td>$${spread.toLocaleString()}</td>
<td class="${statusClass}">${statusClass.toUpperCase()}</td>
</tr>`;
});

document.getElementById("pipeline").innerHTML = html;
}

function save(){
localStorage.setItem("deals", JSON.stringify(deals));
}

function sendEmail(email){
window.location.href = `mailto:${email}?subject=RO'Lyfe Deal Submission&body=New deal ready for review`;
}

render();

</script>

</body>
</html>
