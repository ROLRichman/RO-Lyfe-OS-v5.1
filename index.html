<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO'Lyfe Deal Desk OS v1.1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f1115;
color:#fff;
}

header{
padding:14px;
background:#151925;
text-align:center;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
gap:12px;
padding:12px;
}

.card{
background:#1b2130;
padding:12px;
border-radius:10px;
flex:1;
min-width:300px;
}

h2{
font-size:13px;
color:#00d4ff;
margin-bottom:8px;
}

input, select, button{
width:100%;
padding:8px;
margin:4px 0;
border:none;
border-radius:6px;
font-size:12px;
}

button{
background:#00d4ff;
font-weight:bold;
cursor:pointer;
}

.small{font-size:11px;opacity:0.7}

/* PIPELINE */
.scroll{
overflow-x:auto;
white-space:nowrap;
border:1px solid #222;
border-radius:8px;
}

table{
min-width:1200px;
border-collapse:collapse;
font-size:10px;
}

th,td{
padding:5px;
border-bottom:1px solid #333;
white-space:nowrap;
}

.green{color:#00ff99;}
.yellow{color:#ffcc00;}
.red{color:#ff4d4d;}

/* JAMAL AI */
#jamalBtn{
position:fixed;
bottom:20px;
right:20px;
background:#00d4ff;
color:#000;
border-radius:50%;
width:55px;
height:55px;
font-size:22px;
border:none;
cursor:pointer;
z-index:999;
}

#jamalBox{
position:fixed;
bottom:85px;
right:20px;
width:300px;
height:360px;
background:#1b2130;
border:1px solid #333;
border-radius:10px;
display:none;
flex-direction:column;
z-index:999;
}

#chat{
flex:1;
overflow:auto;
padding:8px;
font-size:12px;
}

#msg{
width:100%;
border:none;
padding:8px;
font-size:12px;
}
</style>
</head>

<body>

<header>RO'Lyfe DEAL DESK OS v1.1 — MONEY ROOM SYSTEM</header>

<div class="container">

<!-- DEAL INPUT -->
<div class="card">
<h2>📍 Deal Intake</h2>

<input id="address" placeholder="Property Address">
<input id="purchase" placeholder="Purchase Price">
<input id="arv" placeholder="ARV">

<select id="lead">
<option>Contractor</option>
<option>Realtor</option>
<option>Real Estate Bees</option>
<option>Wholesaler</option>
<option>Seller</option>
<option>Private Lender</option>
<option>Direct</option>
</select>

<select id="stage">
<option>INTAKE</option>
<option>UNDERWRITING</option>
<option>SENT</option>
<option>NEGOTIATION</option>
<option>APPROVED</option>
<option>CLOSED</option>
</select>

<button onclick="addDeal()">Add Deal</button>
</div>

<!-- ACTIONS -->
<div class="card">
<h2>⚙️ Actions</h2>

<a href="https://form.jotform.com/261416399941062" target="_blank"><button>Loan App</button></a>
<a href="https://form.jotform.com/253154859148062" target="_blank"><button>Upload Docs</button></a>

<button onclick="sendEmail('richman@rootoflyfe.com')">Email Richman</button>
<button onclick="sendEmail('richprivatelender@gmail.com')">Email Lender</button>

<button onclick="resetAll()" style="background:#ff4d4d;">RESET CRM</button>
</div>

<!-- ANALYTICS -->
<div class="card">
<h2>🧠 Deal Analyzer</h2>

<p id="analysis">Enter deal to analyze</p>
</div>

<!-- PIPELINE -->
<div class="card" style="flex-basis:100%">
<h2>📊 Pipeline</h2>

<div class="scroll">
<table>
<thead>
<tr>
<th>Address</th>
<th>Lead</th>
<th>Stage</th>
<th>Buy</th>
<th>ARV</th>
<th>Rehab</th>
<th>Total</th>
<th>Spread</th>
<th>Status</th>
</tr>
</thead>
<tbody id="pipe"></tbody>
</table>
</div>
</div>

</div>

<!-- JAMAL AI -->
<button id="jamalBtn" onclick="toggleJamal()">🤖</button>

<div id="jamalBox">
<div id="chat"></div>
<input id="msg" placeholder="Ask Jamal..." onkeydown="if(event.key==='Enter') askJamal()">
</div>

<script>

let deals = JSON.parse(localStorage.getItem("deals") || "[]");

/* CLEAN INVALID DATA */
deals = deals.filter(d =>
d && d.address && !d.address.includes("undefined") && !isNaN(d.purchase)
);

/* ADD DEAL */
function addDeal(){

let d = {
address:document.getElementById("address").value,
lead:document.getElementById("lead").value,
stage:document.getElementById("stage").value,
purchase:parseFloat(document.getElementById("purchase").value)||0,
arv:parseFloat(document.getElementById("arv").value)||0,
rehab:25000
};

if(!d.address || !d.purchase || !d.arv){
alert("Missing data");
return;
}

deals.push(d);
localStorage.setItem("deals",JSON.stringify(deals));

render();
}

/* PIPELINE */
function render(){

let html="";

deals.forEach(d=>{

let total=d.purchase+d.rehab;
let spread=d.arv-total;

let status =
spread>30000?"ASSIGNABLE":
spread>10000?"REVIEW":"KILL";

let color =
spread>30000?"green":
spread>10000?"yellow":"red";

html+=`
<tr>
<td>${d.address}</td>
<td>${d.lead}</td>
<td>${d.stage}</td>
<td>$${d.purchase}</td>
<td>$${d.arv}</td>
<td>$${d.rehab}</td>
<td>$${total}</td>
<td>$${spread}</td>
<td class="${color}">${status}</td>
</tr>`;
});

document.getElementById("pipe").innerHTML=html;
}

/* EMAIL */
function sendEmail(email){
window.location.href=
`mailto:${email}?subject=RO'Lyfe Deal&body=`+
encodeURIComponent(JSON.stringify(deals,null,2));
}

/* RESET */
function resetAll(){
if(!confirm("Reset all deals?")) return;
localStorage.removeItem("deals");
deals=[];
render();
}

/* JAMAL AI */
function toggleJamal(){
let box=document.getElementById("jamalBox");
box.style.display=box.style.display==="flex"?"none":"flex";
box.style.flexDirection="column";
}

function askJamal(){
let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let q=input.value.toLowerCase();
input.value="";

chat.innerHTML+=`<div><b>You:</b> ${q}</div>`;

let reply="";

if(q.includes("deal")){
reply="Check purchase vs ARV spread. Aim 30k+ assignable.";
}
else if(q.includes("rehab")){
reply="Keep rehab tight. Overestimating kills spreads.";
}
else if(q.includes("good")){
reply="Good deal = strong spread + realistic rehab + clean exit.";
}
else{
reply="I’m Jamal. Ask me about deals, rehab, or spreads.";
}

chat.innerHTML+=`<div><b>Jamal:</b> ${reply}</div>`;
chat.scrollTop=chat.scrollHeight;
}

render();

</script>

</body>
</html>
